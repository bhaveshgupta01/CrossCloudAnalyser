name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke-import every FastAPI service
        run: |
          python -c "
          from registry_service.main import app as a
          from aws_ingestion.main import app as b
          from azure_anomaly.main import app as c
          from gcp_risk.main import app as d
          from iot.main import app as e
          print('apps:', [x.title for x in (a, b, c, d, e)])
          "

      - name: Run pytest
        run: pytest --color=yes

  frontend-typecheck:
    name: Web dashboard typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web_dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web_dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict typecheck
        run: npx tsc -b --noEmit

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dashboard-dist
          path: web_dashboard/dist
          if-no-files-found: error
          retention-days: 7
