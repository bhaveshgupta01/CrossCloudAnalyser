server {
  listen 80;
  server_name _;

  # SPA assets
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxies — mirror the Vite dev-proxy setup.
  # Strip the /api/<service>/ prefix before forwarding.
  location ~ ^/api/registry(/.*)$ {
    proxy_pass ${REGISTRY_URL}$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
  location ~ ^/api/ingestion(/.*)$ {
    proxy_pass ${AWS_INGESTION_URL}$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
  location ~ ^/api/anomaly(/.*)$ {
    proxy_pass ${AZURE_ANOMALY_URL}$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
  location ~ ^/api/risk(/.*)$ {
    proxy_pass ${GCP_RISK_URL}$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
  location ~ ^/api/iot(/.*)$ {
    proxy_pass ${IOT_BRIDGE_URL}$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
}
